  <rect x="92" y="480" width="102" height="24" rx="3" class="soft"/><text x="102" y="497" class="small">theme_lab</text>
  <rect x="252" y="92" width="676" height="660" rx="8" class="panel"/>
  <text x="280" y="126" class="text">Controls</text><text x="840" y="126" class="muted">Flat ice-blue, crisp border, low shadow</text>
