  <rect x="40" y="192" width="176" height="34" rx="5" class="panel2"/><text x="58" y="214" class="small">Data Controls</text>
  <rect x="40" y="236" width="176" height="34" rx="5" class="panel2"/><text x="58" y="258" class="small">Overlays</text>
  <rect x="40" y="280" width="176" height="34" rx="5" class="panel2"/><text x="58" y="302" class="small">Theme Tokens</text>
