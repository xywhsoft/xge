<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800">
  <title>XUI Style A - Ice Console</title>
  <defs>
    <style>
      .bg{fill:#eef8ff}.panel{fill:#f9fdff;stroke:#b8dff5;stroke-width:1}.panel2{fill:#f2faff;stroke:#a8d7ef;stroke-width:1}
      .line{stroke:#9fd1ec;stroke-width:1;fill:none}.soft{fill:#dff3ff}.accent{fill:#35aeea}.accent2{fill:#86d8ff}
      .text{fill:#18384f;font:14px "Segoe UI",Arial,sans-serif}.muted{fill:#5f8094;font:12px "Segoe UI",Arial,sans-serif}
      .small{fill:#477187;font:11px "Segoe UI",Arial,sans-serif}.white{fill:#fff;font:13px "Segoe UI",Arial,sans-serif}
      .focus{fill:none;stroke:#35aeea;stroke-width:2}.danger{fill:#ff6b7a}.ok{fill:#22c7a9}.warn{fill:#ffbd4a}
    </style>
  </defs>
  <rect class="bg" width="1280" height="800"/>
  <rect x="24" y="22" width="1232" height="48" rx="6" class="panel"/>
  <text x="48" y="52" class="text">XUI Control Lab</text>
  <rect x="206" y="34" width="72" height="24" rx="4" class="accent"/><text x="225" y="51" class="white">Build</text>
  <rect x="288" y="34" width="74" height="24" rx="4" class="soft"/><text x="309" y="51" class="small">Run</text>
  <rect x="372" y="34" width="84" height="24" rx="4" class="soft"/><text x="390" y="51" class="small">Debug</text>
  <rect x="1038" y="34" width="142" height="24" rx="12" fill="#fff" stroke="#a8d7ef"/>
