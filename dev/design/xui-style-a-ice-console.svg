  <line x1="280" y1="446" x2="858" y2="446" class="line"/>
  <text x="304" y="474" class="small">Name</text><text x="520" y="474" class="small">Type</text><text x="696" y="474" class="small">State</text>
  <rect x="296" y="492" width="540" height="30" rx="4" fill="#edf8ff"/><text x="304" y="512" class="small">xge_xui_button.c</text><text x="520" y="512" class="small">control</text><text x="696" y="512" fill="#1686bd" font-family="Segoe UI,Arial" font-size="11">ready</text>
  <text x="304" y="552" class="small">xge_xui_table_view.c</text><text x="520" y="552" class="small">data</text><text x="696" y="552" class="small">planned</text>
  <text x="304" y="592" class="small">xge_xui_theme.c</text><text x="520" y="592" class="small">style</text><text x="696" y="592" class="small">planned</text>
