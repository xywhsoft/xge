  <rect x="492" y="154" width="92" height="34" rx="5" fill="#edf5fa" stroke="#c7dcea"/><text x="516" y="176" fill="#91a8b6" font-family="Segoe UI,Arial" font-size="13">Disabled</text>
  <rect x="598" y="154" width="92" height="34" rx="5" class="danger"/><text x="624" y="176" class="white">Danger</text>
