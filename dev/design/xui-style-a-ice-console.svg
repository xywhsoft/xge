  <text x="980" y="256" class="small">Radius</text><rect x="1108" y="238" width="92" height="28" rx="4" fill="#fff" stroke="#b8dff5"/><text x="1142" y="257" class="small">6</text>
  <text x="980" y="298" class="small">Focus</text><rect x="1108" y="280" width="92" height="28" rx="4" class="focus"/>
  <text x="980" y="354" class="muted">Overlay</text><rect x="980" y="376" width="230" height="126" rx="7" fill="#fbfeff" stroke="#35aeea"/>
  <text x="1000" y="408" class="text">MessageBox</text><text x="1000" y="436" class="small">Confirm applying theme?</text>
  <rect x="1010" y="462" width="74" height="28" rx="4" class="accent"/><text x="1034" y="481" class="white">OK</text>
  <rect x="1096" y="462" width="84" height="28" rx="4" fill="#fff" stroke="#b8dff5"/><text x="1119" y="481" class="small">Cancel</text>
</svg>
