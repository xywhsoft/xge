  <rect x="594" y="338" width="230" height="18" rx="9" fill="#cfeeff"/><rect x="594" y="338" width="150" height="18" rx="9" class="accent"/>
  <rect x="280" y="410" width="578" height="260" rx="6" fill="#fff" stroke="#b8dff5"/>
