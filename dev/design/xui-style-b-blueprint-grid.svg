<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800">
  <title>XUI Style B - Blueprint Grid</title>
  <defs>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse"><path d="M24 0H0V24" fill="none" stroke="#d6edfb" stroke-width="1"/></pattern>
    <style>
      .bg{fill:#f7fcff}.gridfill{fill:url(#grid)}.panel{fill:#ffffff;stroke:#8ccbed;stroke-width:1.5}.panel2{fill:#eff9ff;stroke:#9dd5f1;stroke-width:1}
      .ink{fill:#12364e;font:14px "Segoe UI",Arial,sans-serif}.muted{fill:#5b7e93;font:12px "Segoe UI",Arial,sans-serif}.tiny{fill:#4b7288;font:11px "Segoe UI",Arial,sans-serif}
      .accent{fill:#139ddb}.pale{fill:#dff5ff}.line{stroke:#73bfe8;stroke-width:1;fill:none}.focus{stroke:#139ddb;stroke-width:2;fill:none}
    </style>
  </defs>
