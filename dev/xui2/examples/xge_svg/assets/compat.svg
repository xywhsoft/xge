<svg xmlns="http://www.w3.org/2000/svg" width="160" height="120" viewBox="0 0 160 120">
  <style>
    .tick { fill: none; stroke: #ffffff; stroke-width: 7; stroke-linecap: round; stroke-linejoin: round; }
    .orbit { fill: none; stroke: #24364b; stroke-width: 2; stroke-dasharray: 6 4; opacity: .42; }
  </style>
  <defs>
