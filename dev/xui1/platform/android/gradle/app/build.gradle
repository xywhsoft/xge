plugins {
	id "com.android.application"
}

android {
	namespace "dev.xge.smoke"
	compileSdk 35

	defaultConfig {
		applicationId "dev.xge.smoke"
		minSdk 18
		targetSdk 35
		versionCode 1
		versionName "0.1.0"

		ndk {
			abiFilters "arm64-v8a"
		}

		externalNativeBuild {
			cmake {
				arguments "-DANDROID_STL=none"
			}
		}
	}

	sourceSets {
		main {
			manifest.srcFile "../../AndroidManifest.xml"
		}
	}

	externalNativeBuild {
		cmake {
			path "../../CMakeLists.txt"
		}
	}
}
