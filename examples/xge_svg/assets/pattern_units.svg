<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <rect width="320" height="180" fill="#111827"/>
  <defs>
    <pattern id="boxPercent" patternUnits="objectBoundingBox" patternContentUnits="objectBoundingBox" width="50%" height="50%">
      <rect x="0" y="0" width="0.25" height="0.25" fill="#22d3ee"/>
      <rect x="0.25" y="0.25" width="0.25" height="0.25" fill="#f472b6"/>
    </pattern>
    <pattern id="userPercent" patternUnits="userSpaceOnUse" width="12.5%" height="25%">
      <rect x="0" y="0" width="20" height="20" fill="#facc15"/>
      <circle cx="30" cy="30" r="14" fill="#34d399"/>
    </pattern>
  </defs>

  <rect x="28" y="34" width="120" height="112" rx="12" fill="url(#boxPercent)"/>
  <rect x="172" y="34" width="120" height="112" rx="12" fill="url(#userPercent)"/>
  <rect x="28" y="34" width="120" height="112" rx="12" fill="none" stroke="#e5e7eb" stroke-opacity="0.45" stroke-width="2"/>
  <rect x="172" y="34" width="120" height="112" rx="12" fill="none" stroke="#e5e7eb" stroke-opacity="0.45" stroke-width="2"/>
</svg>
