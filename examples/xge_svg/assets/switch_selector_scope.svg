<svg width="360" height="180" viewBox="0 0 180 90" xmlns="http://www.w3.org/2000/svg">
  <rect width="180" height="90" fill="#0f172a"/>

  <style>
    .panel { fill: #22c55e; stroke: #f8fafc; stroke-width: 3; }
    .panel:has(.leaked) { fill: #ef4444; stroke: #fecaca; }
    .panel:has(.visible-child) + .selector-target { fill: #38bdf8; }
  </style>

  <g class="panel">
    <switch>
      <g requiredExtensions="xge.unsupported">
        <rect class="leaked" x="24" y="22" width="58" height="34" rx="7"/>
      </g>
      <g>
        <rect class="visible-child" x="24" y="22" width="58" height="34" rx="7"/>
      </g>
    </switch>
  </g>

  <rect class="selector-target" x="96" y="28" width="58" height="20" rx="4"/>
</svg>
