<svg viewBox="0 0 80 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="sourceThenFlood" filterUnits="userSpaceOnUse" primitiveUnits="userSpaceOnUse" x="0" y="0" width="80" height="60">
      <feFlood x="30" y="6" width="18" height="12" flood-color="#f97316" result="orange"/>
      <feBlend in="SourceGraphic" in2="orange" mode="normal"/>
    </filter>
    <filter id="floodThenSource" filterUnits="userSpaceOnUse" primitiveUnits="userSpaceOnUse" x="0" y="0" width="80" height="60">
      <feFlood x="30" y="24" width="18" height="12" flood-color="#f97316" result="orange"/>
      <feBlend in="orange" in2="SourceGraphic" mode="normal"/>
    </filter>
    <filter id="rasterThenFlood" filterUnits="userSpaceOnUse" primitiveUnits="userSpaceOnUse" x="0" y="0" width="80" height="60">
      <feFlood x="30" y="42" width="18" height="12" flood-color="#f97316" result="orange"/>
      <feBlend in="SourceGraphic" in2="orange" mode="normal"/>
    </filter>
  </defs>
  <rect x="8" y="6" width="12" height="12" fill="#22c55e" filter="url(#sourceThenFlood)"/>
  <rect x="8" y="24" width="12" height="12" fill="#22c55e" filter="url(#floodThenSource)"/>
  <rect x="8" y="42" width="12" height="12" fill="#22c55e" filter="url(#rasterThenFlood)"/>
</svg>
