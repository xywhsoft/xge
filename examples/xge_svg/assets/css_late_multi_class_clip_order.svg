<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 64">
  <defs><clipPath id="left"><rect width="64" height="64"/></clipPath><clipPath id="right"><rect x="64" width="64" height="64"/></clipPath></defs>
  <rect class="leftTone rightTone" width="128" height="64" fill="#00f"/>
  <style>.leftTone { clip-path: url(#left); } .rightTone { clip-path: url(#right); }</style>
</svg>
