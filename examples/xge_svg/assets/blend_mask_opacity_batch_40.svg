  <g fill="#24425f">
    <rect x="5" y="5" width="90" height="70"/><rect x="105" y="5" width="90" height="70"/>
    <rect x="205" y="5" width="90" height="70"/><rect x="305" y="5" width="90" height="70"/>
    <rect x="405" y="5" width="90" height="70"/><rect x="5" y="85" width="90" height="70"/>
