  <g mask="url(#gray6)" opacity="0.78"><rect x="15" y="95" width="70" height="50" fill="#ffb347"/></g>
  <g mix-blend-mode="multiply" mask="url(#white7)" opacity="0.78"><rect x="115" y="95" width="70" height="50" fill="#ffb347"/></g>
