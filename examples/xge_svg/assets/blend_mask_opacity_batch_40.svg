    <rect x="305" y="85" width="90" height="70"/><rect x="405" y="85" width="90" height="70"/>
  </g>

  <g mix-blend-mode="multiply"><rect x="15" y="15" width="70" height="50" fill="#ffb347"/></g>
  <g mix-blend-mode="multiply" opacity="0.78"><rect x="115" y="15" width="70" height="50" fill="#ffb347"/></g>
  <g mix-blend-mode="multiply" mask="url(#gray3)"><rect x="215" y="15" width="70" height="50" fill="#ffb347"/></g>
