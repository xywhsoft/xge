<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 240">
  <rect width="360" height="240" fill="#101820"/>
  <text x="24" y="30" fill="#d7e2ee" font-size="15">invalid clip / mask / filter references</text>
  <defs>
    <clipPath id="leftClip">
      <rect x="24" y="48" width="150" height="55"/>
    </clipPath>
    <mask id="leftMask" maskUnits="userSpaceOnUse">
      <rect x="24" y="116" width="150" height="55" fill="white"/>
    </mask>
    <filter id="moveRight" x="0" y="0" width="360" height="240" filterUnits="userSpaceOnUse">
      <feOffset dx="24" dy="0"/>
    </filter>
  </defs>
  <g clip-path="url(#leftClip)">
    <rect x="24" y="48" width="300" height="22" fill="#38bdf8" clip-path="bad"/>
    <rect x="24" y="78" width="300" height="22" fill="#f97316" clip-path="none"/>
  </g>
  <g mask="url(#leftMask)">
    <rect x="24" y="116" width="300" height="22" fill="#22c55e" mask="bad"/>
    <rect x="24" y="146" width="300" height="22" fill="#a855f7" mask="none"/>
  </g>
  <g filter="url(#moveRight)">
    <rect x="24" y="190" width="60" height="18" fill="#facc15" filter="bad"/>
    <rect x="120" y="190" width="60" height="18" fill="#ef4444" filter="none"/>
  </g>
  <g fill="#d7e2ee" font-size="12">
    <text x="24" y="44">clip inherited by group</text>
    <text x="24" y="112">mask inherited by group</text>
    <text x="24" y="186">filter inherited by group</text>
  </g>
</svg>
