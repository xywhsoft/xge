<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <rect width="320" height="180" fill="#111827"/>
  <defs>
    <radialGradient id="sharedRadialStops" spreadMethod="reflect">
      <stop offset="0" stop-color="#fb7185"/>
      <stop offset="0.5" stop-color="#facc15"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </radialGradient>
    <linearGradient id="linearFromRadial" href="#sharedRadialStops" x1="0%" y1="0%" x2="100%" y2="0%"/>

    <linearGradient id="sharedLinearStops" spreadMethod="repeat">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <radialGradient id="radialFromLinear" href="#sharedLinearStops" cx="50%" cy="50%" r="55%"/>
  </defs>

  <rect x="28" y="34" width="122" height="112" rx="14" fill="url(#linearFromRadial)"/>
  <circle cx="228" cy="90" r="56" fill="url(#radialFromLinear)"/>
  <rect x="28" y="34" width="122" height="112" rx="14" fill="none" stroke="#e5e7eb" stroke-opacity="0.45" stroke-width="2"/>
  <circle cx="228" cy="90" r="56" fill="none" stroke="#e5e7eb" stroke-opacity="0.45" stroke-width="2"/>
</svg>
