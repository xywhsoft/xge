  <circle class="hot" cx="92" cy="23" r="10"/>
  <g>
    <rect class="target" probe="1" x="110" y="14" width="14" height="18" fill="none"/>
  </g>
  <text x="16" y="50" fill="#cbd5e1" font-size="6" font-family="Arial">XGE CSS subset</text>
