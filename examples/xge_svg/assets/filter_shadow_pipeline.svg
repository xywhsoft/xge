<svg viewBox="0 0 180 100" xmlns="http://www.w3.org/2000/svg">
	<rect x="0" y="0" width="180" height="100" fill="#111827"/>
	<defs>
		<filter id="shapeShadow" filterUnits="userSpaceOnUse" primitiveUnits="userSpaceOnUse" x="8" y="8" width="96" height="64">
			<feGaussianBlur in="SourceAlpha" stdDeviation="0" result="blur"/>
			<feOffset in="blur" dx="10" dy="8" result="offsetBlur"/>
			<feFlood flood-color="#a855f7" flood-opacity="1" result="shadowColor"/>
			<feComposite in="shadowColor" in2="offsetBlur" operator="in" result="shadow"/>
			<feMerge>
				<feMergeNode in="shadow"/>
				<feMergeNode in="SourceGraphic"/>
			</feMerge>
		</filter>
		<filter id="floodFirstShadow" filterUnits="userSpaceOnUse" primitiveUnits="userSpaceOnUse" x="110" y="56" width="62" height="34">
			<feFlood flood-color="#f97316" flood-opacity="1" result="shadowPaint"/>
			<feGaussianBlur in="SourceAlpha" stdDeviation="0" result="alphaBlur"/>
			<feOffset in="alphaBlur" dx="8" dy="5" result="alphaOffset"/>
			<feComposite in="shadowPaint" in2="alphaOffset" operator="in" result="shadow"/>
			<feMerge>
				<feMergeNode in="SourceGraphic"/>
				<feMergeNode in="shadow"/>
			</feMerge>
		</filter>
	</defs>
	<rect x="24" y="20" width="58" height="32" rx="7" fill="#38bdf8" stroke="#f8fafc" stroke-width="3" filter="url(#shapeShadow)"/>
	<circle cx="134" cy="70" r="10" fill="#facc15" filter="url(#floodFirstShadow)"/>
</svg>
