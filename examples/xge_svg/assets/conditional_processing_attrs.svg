<svg width="360" height="180" viewBox="0 0 180 90" xmlns="http://www.w3.org/2000/svg">
  <rect width="180" height="90" fill="#0f172a"/>

  <g requiredExtensions="xge.unsupported">
    <style>
      .target { fill: #ef4444; stroke: #fecaca; stroke-width: 3; }
    </style>
    <rect class="leaked" x="8" y="8" width="20" height="20" fill="#ef4444"/>
  </g>

  <style>
    .target { fill: #22c55e; stroke: #f8fafc; stroke-width: 3; }
    .subject:has(.leaked) { fill: #ef4444; }
  </style>

  <g class="subject">
    <g requiredFeatures="http://www.w3.org/TR/SVG11/feature#Animation">
      <rect class="leaked" x="24" y="22" width="58" height="34" rx="7"/>
    </g>
    <rect class="target" x="24" y="22" width="58" height="34" rx="7"/>
  </g>

  <g systemLanguage="zz">
    <rect x="96" y="20" width="28" height="14" fill="#ef4444"/>
  </g>
  <g systemLanguage="zh">
    <rect x="96" y="42" width="28" height="14" fill="#38bdf8"/>
  </g>

  <text x="24" y="72" fill="#cbd5e1" font-size="8" font-family="Arial">conditional attrs</text>
</svg>
