<svg width="320" height="160" viewBox="0 0 160 80" xmlns="http://www.w3.org/2000/svg">
  <rect width="160" height="80" fill="#0f172a"/>
  <defs>
    <filter id="zeroShift" filterUnits="userSpaceOnUse" primitiveUnits="userSpaceOnUse" x="0" y="0" width="160" height="80">
      <feFlood x="22" y="22" width="34" height="20" flood-color="#22c55e" result="green"/>
      <feFlood flood-color="#ff0000" result="map"/>
      <feDisplacementMap in="green" in2="map" scale="0" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="uniformShift" filterUnits="userSpaceOnUse" primitiveUnits="userSpaceOnUse" x="0" y="0" width="160" height="80">
      <feFlood x="88" y="28" width="34" height="20" flood-color="#22c55e" result="green"/>
      <feFlood flood-color="#ff0000" result="map"/>
      <feDisplacementMap in="green" in2="map" scale="12" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <rect x="18" y="18" width="42" height="28" fill="#334155"/>
  <rect x="18" y="18" width="42" height="28" fill="#ffffff" filter="url(#zeroShift)"/>
  <rect x="84" y="24" width="42" height="28" fill="#334155"/>
  <rect x="84" y="24" width="42" height="28" fill="#ffffff" filter="url(#uniformShift)"/>
</svg>
