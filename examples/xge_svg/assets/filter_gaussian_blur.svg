<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 90">
  <defs>
    <filter id="blurBoth" filterUnits="userSpaceOnUse" primitiveUnits="userSpaceOnUse" x="12" y="12" width="62" height="48">
      <feGaussianBlur stdDeviation="2.4 2.4"/>
    </filter>
    <filter id="blurX" primitiveUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="4 0"/>
    </filter>
    <filter id="blurBox" primitiveUnits="objectBoundingBox">
      <feGaussianBlur stdDeviation="8% 12%"/>
    </filter>
    <filter id="blurInvalid">
      <feGaussianBlur stdDeviation="-1 2"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="160" height="90" fill="#101827"/>
  <circle cx="34" cy="34" r="19" fill="#38bdf8" filter="url(#blurBoth)"/>
  <rect x="68" y="22" width="28" height="24" fill="#f97316" filter="url(#blurX)"/>
  <text x="104" y="44" font-size="28" fill="#22c55e" filter="url(#blurBox)">B</text>
  <rect x="122" y="56" width="20" height="16" fill="#e879f9" filter="url(#blurInvalid)"/>
  <text x="18" y="78" font-size="12" fill="#cbd5e1">Gaussian blur</text>
</svg>
