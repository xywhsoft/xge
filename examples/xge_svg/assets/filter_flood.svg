<svg width="180" height="90" viewBox="0 0 180 90" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="boxFlood" x="25%" y="25%" width="50%" height="50%">
      <feFlood flood-color="#22c55e" flood-opacity="1"/>
    </filter>
    <filter id="styleFlood" filterUnits="userSpaceOnUse" x="102" y="24" width="44" height="26">
      <feFlood style="flood-color:#f97316;flood-opacity:1"/>
    </filter>
    <filter id="transparentFlood" x="0" y="0" width="100%" height="100%">
      <feFlood flood-color="#ef4444" flood-opacity="0"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="180" height="90" fill="#111827"/>
  <rect x="18" y="20" width="48" height="40" fill="#1d4ed8" opacity="0.35"/>
  <rect x="18" y="20" width="48" height="40" fill="#38bdf8" filter="url(#boxFlood)"/>
  <rect x="104" y="28" width="18" height="18" fill="#38bdf8" filter="url(#styleFlood)"/>
  <rect x="70" y="20" width="22" height="22" fill="#a855f7" filter="url(#transparentFlood)"/>
</svg>
